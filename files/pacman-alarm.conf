[options]
HoldPkg     = pacman glibc
# The pi-stomp and pistomp-recovery venvs are built on the system (pacman) python
# and contain cp3xx-compiled C extensions (pygame/lgpio/spidev). A python minor
# bump would break every venv at once, so hold it. Bump deliberately by rebuilding
# the suite against the new interpreter.
IgnorePkg   = python
Architecture = aarch64
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 5

[core]
Server = http://mirror.archlinuxarm.org/$arch/$repo
Server = http://de3.mirror.archlinuxarm.org/$arch/$repo

[extra]
Server = http://mirror.archlinuxarm.org/$arch/$repo
Server = http://de3.mirror.archlinuxarm.org/$arch/$repo

[alarm]
Server = http://mirror.archlinuxarm.org/$arch/$repo
Server = http://de3.mirror.archlinuxarm.org/$arch/$repo
